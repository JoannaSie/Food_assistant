<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sezonowy Food Assistant</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Nutritionist + Polish seasonal food expert</p>
          <h1>Sezonowy Food Assistant</h1>
          <p class="intro">
            Aplikacja dobiera lokalne produkty sezonowe w Polsce, uwzględnia zasady diety
            przeciwzapalnej oraz fazę cyklu menstruacyjnego, a następnie proponuje realne
            przepisy z AniaGotuje.pl.
          </p>
        </div>
      </section>

      <section class="controls card">
        <div class="field">
          <label for="month">Miesiąc</label>
          <select id="month"></select>
        </div>
        <div class="field">
          <label for="phase">Faza cyklu</label>
          <select id="phase">
            <option value="menstrual">Menstrualna</option>
            <option value="follicular">Folikularna</option>
            <option value="ovulatory">Owulacyjna</option>
            <option value="luteal">Lutealna</option>
          </select>
        </div>
        <button id="generate" type="button">Generuj rekomendacje</button>
      </section>

      <section class="output card">
        <div class="output-header">
          <h2>Wynik</h2>
          <button id="copy" type="button" class="secondary">Kopiuj w formacie Markdown</button>
        </div>
        <pre id="result" aria-live="polite"></pre>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
