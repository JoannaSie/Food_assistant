# Requires repository Pages settings to publish from the gh-pages branch.
name: Publish branch and PR previews

on:
  push:
    branches-ignore:
      - main
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-pages-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish-preview:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Publish preview to GitHub Pages
        uses: rajyan/preview-pages@v1
        with:
          source-dir: out
          target-branch: gh-pages
          target-dir: previews
          clean: false
          pr-per-commit: false
          branch-per-commit: false
          pr-comment: sticky
          branch-comment: each

  cleanup-pr-preview:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Remove closed PR preview
        run: |
          rm -rf previews/pr-${{ github.event.number }}
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Remove preview for PR #${{ github.event.number }}"
            git push
          fi
